# prepareThreshold=0 avoids "cached plan must not change result type" on Neon/PgBouncer poolers
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://ep-lively-dawn-a2f02xm5-pooler.eu-central-1.aws.neon.tech/neondb?sslmode=require&channelBinding=require&prepareThreshold=0}
spring.datasource.username=${DATABASE_USER:neondb_owner}
spring.datasource.password=${DATABASE_PASSWORD:npg_GMrEWtJ4ZP2I}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# Schema managed via Flyway; Hibernate only validates
spring.jpa.hibernate.ddl-auto=validate

# Flyway: the DB schema already existed before Flyway was introduced.
# baseline-on-migrate creates the flyway_schema_history table on first run and
# marks everything up to baseline-version as applied, so only newer migrations run.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=2.5.0
#spring.flyway.repair-on-migrate=true
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

app.base-url=${APP_BASE_URL:https://crm-app.up.railway.app}

management.health.mail.enabled=false

app.jwt.secret=${JWT_SECRET}
