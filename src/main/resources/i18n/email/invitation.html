<!DOCTYPE html>
<html lang="{{lang}}" dir="{{dir}}">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="margin:0;padding:0;background:#f4f6fb;font-family:'Segoe UI',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f6fb;padding:40px 0;">
    <tr><td align="center">
      <table width="480" cellpadding="0" cellspacing="0"
             style="background:#ffffff;border-radius:12px;box-shadow:0 2px 16px rgba(0,0,0,0.08);overflow:hidden;">

        <tr>
          <td style="background:#1565c0;padding:32px 40px;text-align:center;">
            <h1 style="margin:0;color:#ffffff;font-size:22px;font-weight:700;letter-spacing:1px;">
              {{heading}}
            </h1>
          </td>
        </tr>

        <tr>
          <td style="padding:40px 40px 24px;text-align:start;">
            <p style="margin:0 0 8px;color:#333;font-size:15px;">{{greeting}}</p>
            <p style="margin:0 0 28px;color:#555;font-size:14px;line-height:1.6;">
              {{body}}
            </p>

            <div style="text-align:center;margin-bottom:28px;">
              <a href="{{inviteLink}}"
                 style="display:inline-block;background:#1565c0;color:#ffffff;
                        font-size:15px;font-weight:600;text-decoration:none;
                        padding:14px 32px;border-radius:8px;letter-spacing:0.5px;">
                {{cta}}
              </a>
            </div>

            <p style="margin:0 0 8px;color:#888;font-size:12px;line-height:1.6;">
              {{linkNote}} <a href="{{inviteLink}}" style="color:#1565c0;word-break:break-all;">{{inviteLink}}</a>
            </p>

            <p style="margin:16px 0 0;color:#aaa;font-size:11px;">
              {{expiry}}
            </p>
          </td>
        </tr>

        <tr>
          <td style="background:#f8f9fc;padding:20px 40px;border-top:1px solid #e8eaf0;text-align:center;">
            <p style="margin:0;color:#aaa;font-size:11px;">
              {{footer}}
            </p>
          </td>
        </tr>

      </table>
    </td></tr>
  </table>
</body>
</html>
