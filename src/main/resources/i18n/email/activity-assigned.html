<div style="font-family:'Segoe UI',Arial,sans-serif;background:#f4f6fb;padding:32px;" lang="{{lang}}" dir="{{dir}}">
  <div style="max-width:480px;margin:0 auto;background:#fff;border-radius:10px;
              box-shadow:0 2px 12px rgba(0,0,0,.08);overflow:hidden;">
    <div style="background:#1565c0;padding:24px 32px;">
      <h2 style="margin:0;color:#fff;font-size:18px;text-align:start;">{{heading}}</h2>
    </div>
    <div style="padding:28px 32px;text-align:start;">
      <p style="margin:0 0 16px;color:#333;">{{body}}</p>
      <div style="background:#f0f4ff;border-inline-start:4px solid #1565c0;padding:12px 16px;
                  border-radius:4px;font-weight:600;color:#1565c0;font-size:15px;">
        {{activityTitle}}
      </div>
      <p style="margin:16px 0 0;color:#888;font-size:12px;">{{cta}}</p>
    </div>
  </div>
</div>
