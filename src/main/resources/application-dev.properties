spring.datasource.url=jdbc:h2:file:./data/crmdb-dev;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Schema from Hibernate in dev; Flyway is for postgres/prod only.
spring.flyway.enabled=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

app.jwt.secret=ZGV2LW9ubHktc2VjcmV0LWtleS10aGF0LWlzLWF0LWxlYXN0LTMyLWNoYXJz

# Startup profiling (see docs/startup-performance-report.md)
app.performance.profiling=false
app.performance.probe-dashboard=false
