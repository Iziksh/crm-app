spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Schema from Hibernate in tests; Flyway scripts target PostgreSQL.
spring.flyway.enabled=false

# Stub SMTP so EmailService binds without a real mail server
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test@example.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Stub admin email and OTP settings
app.admin.email=test@example.com
otp.expiry-minutes=5
otp.length=6
device-trust.days=14
device-trust.cookie-name=DEVICE_TRUST
