spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=YEAR,VALUE,KEY
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
# Quote all identifiers to avoid H2 reserved-word conflicts (e.g. `year`, `value`)

# Flyway disabled — Hibernate manages the schema in tests
spring.flyway.enabled=false

app.jwt.secret=dGVzdC1zZWNyZXQta2V5LXRoYXQtaXMtYXQtbGVhc3QtMzItY2hhcnM=
app.base-url=http://localhost

# Mail — real sender is replaced by @MockBean; disable actuator health check to prevent context failure
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test@test.com
spring.mail.password=test
management.health.mail.enabled=false

vaadin.launch-browser=false
vaadin.devmode.enabled=false